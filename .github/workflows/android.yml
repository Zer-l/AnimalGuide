name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          BAIDU_API_KEY=${{ secrets.BAIDU_API_KEY }}
          BAIDU_SECRET_KEY=${{ secrets.BAIDU_SECRET_KEY }}
          DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID=${{ secrets.DOUBAO_ENDPOINT_ID }}
          CLOUDBASE_ENV_ID=${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_ACCESS_TOKEN=${{ secrets.CLOUDBASE_ACCESS_TOKEN }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          BAIDU_API_KEY=${{ secrets.BAIDU_API_KEY }}
          BAIDU_SECRET_KEY=${{ secrets.BAIDU_SECRET_KEY }}
          DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID=${{ secrets.DOUBAO_ENDPOINT_ID }}
          CLOUDBASE_ENV_ID=${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_ACCESS_TOKEN=${{ secrets.CLOUDBASE_ACCESS_TOKEN }}
          EOF

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/animalguide

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release AAB
        env:
          KEYSTORE_FILE: keystore/animalguide
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
